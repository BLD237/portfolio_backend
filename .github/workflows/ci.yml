name: Backend CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python Syntax
        run: python -m compileall app/

      - name: Run Integration Startup Test
        run: |
          # Start the server in the background
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8085 &
          PID=$!
          
          # Wait for server to start
          echo "Waiting for FastAPI server to start..."
          HEALTHY=false
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8085/health | grep -q '"status":"ok"'; then
              echo "FastAPI server started successfully and is healthy!"
              HEALTHY=true
              break
            fi
            sleep 1
          done
          
          if [ "$HEALTHY" = false ]; then
            echo "FastAPI server failed to start or respond to health check."
            exit 1
          fi
          
          # Terminate server
          kill $PID
